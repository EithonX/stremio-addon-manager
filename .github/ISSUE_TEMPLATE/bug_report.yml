name: Bug Report
description: Create a report to help us improve Stremio Addon Manager
title: '[BUG] '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear description of what you expected to happen.
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g. Windows 11, macOS, Linux, Android
  - type: input
    id: browser
    attributes:
      label: Browser
      description: e.g. Chrome, Firefox, Safari, Edge
  - type: dropdown
    id: access-method
    attributes:
      label: Access Method
      options:
        - Password Login
        - AuthKey Direct Paste
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, browser console error logs, or screenshots about the problem here.
